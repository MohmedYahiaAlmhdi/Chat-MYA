name: chatbot_app
description: "A new Flutter project."
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: ^3.11.4

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.8
  get: ^4.7.3
  http: ^1.6.0
  flutter_dotenv: ^6.0.0
  speech_to_text: ^7.3.0
  image_picker: ^1.2.1
  flutter_spinkit: ^5.2.2
  flutter_markdown: ^0.7.7+1
  get_storage: ^2.1.1
  uuid: ^4.5.3
  flutter_native_splash: ^2.4.7
  flutter_launcher_icons: ^0.14.4

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0
  rename_app: ^1.6.5

flutter:
  uses-material-design: true
  assets:
    - .env
    - assets/images/Chat_MYA.png   # تم تغيير المسافة إلى شرطة سفلية

# ⬇️ لا توجد أي مسافة بادئة قبل السطر التالي
flutter_native_splash:
  color: "#02050A"
  image: assets/images/Chat_MYA.png
  fullscreen: true
  android_12:
    color: "#02050A"
    image: assets/images/Chat_MYA.png
    icon_background_color: "#02050A"

flutter_launcher_icons:
  android: true
  ios: true
  image_path: assets/images/Chat_MYA.png
  min_sdk_android: 21
  adaptive_icon_background: "#02050A"   # لون خلفية الأيقونة التكيفية (لأندرويد)
  adaptive_icon_foreground: assets/images/Chat_MYA.png